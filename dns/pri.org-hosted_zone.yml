      HostedZoneId: !Ref HostedZone
      RecordSets:
        # media.pri.org
        - Name: !Sub _f0fa2c88911a348a80663c7049715f1a.media.${Domain}
          ResourceRecords:
            - _41d89661278775045b3a48ff25d1cc23.acm-validations.aws.
          TTL: "60"
          Type: CNAME

        # cdn.pri.org
        - Name: !Sub _723d8fa44ea3930330ee0ef735f39873.cdn.${Domain}
