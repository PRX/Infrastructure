AWSTemplateFormatVersion: "2010-09-09"
Description: Hosted zone and record sets for pri.org

Parameters:
  Domain:
    Default: pri.org.
    Description: The domain name and hosted zone
    Type: String

Resources:
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      HostedZoneConfig:
        Comment: Legacy PRI domain
      HostedZoneTags:
        - { Key: prx:meta:tagging-version, Value: "2021-04-07" }
        - { Key: prx:cloudformation:stack-name, Value: !Ref AWS::StackName }
        - { Key: prx:cloudformation:stack-id, Value: !Ref AWS::StackId }
        - { Key: prx:ops:environment, Value: Production }
        - { Key: prx:dev:family, Value: The World }
        - { Key: prx:dev:application, Value: Website }
      Name: !Ref Domain

# Purpose-based
  Text:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      # Route53 expects TXT record values to be enclosed in double quotes, so in
      # the YAML they need to be double-quoted.
      # Each domain name should only have a single text record. Add multiple
      # resource records if necessary.
      # All SPF records need to go into a single resource record.
      Comment: TXT Records
      HostedZoneId: !Ref HostedZone
      RecordSets:
        - Name: !Ref Domain
          ResourceRecords:
            # SPF
            - '"v=spf1 include:_spf.google.com -all"'
            # Domain verification
            - '"google-site-verification=5EwbpkFWN414TjI2cZu2zVFb3xA_OVjLbQNPHjNwuG4"'
            - '"google-site-verification=2qbE_13DuElR1CMocR3R43OS8KbAcrGn-qcFZs_J6WQ"'
            - '"google-site-verification=bDiqRl_IoIg_LyFVylu5DT7HB2esYm_RFoo0Ic_GP7I"'
            - '"apple-domain-verification=UUcr0lEc8539QZI4"'
            - '"amazon-business-verification=0e6794c382c723496424a539a90940d852766bec436a89302f1810aac890d54f"'
            - '"ogmoukr4cml1gi9btbf7mj3gma"'
          TTL: "300"
          Type: TXT
  Email:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: Email
      HostedZoneId: !Ref HostedZone
      RecordSets:

        # Inbound email for @pri.org, currently through Google Workspace
        - Name: !Ref Domain
          ResourceRecords:
            - 1 smtp.google.com.
          TTL: "60"
          Type: MX

        # DMARC
        # https://simonandrews.ca/articles/how-to-set-up-spf-dkim-dmarc#dmarc
        # Sets the DMARC policy for email sent from @pri.org
        - Name: !Sub _dmarc.${Domain}
          ResourceRecords:
            - '"v=DMARC1; p=reject; pct=100; ri=86400; rua=mailto:dmarc-reports@prx.org,mailto:dmarc@qf66rrn4.uriports.com; ruf=mailto:dmarc-reports@prx.org,mailto:dmarc@qf66rrn4.uriports.com; aspf=r; adkim=r"'
          TTL: "60"
          Type: TXT

  Projects:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: Projects
      HostedZoneId: !Ref HostedZone
      RecordSets:
        - Name: !Sub projects.${Domain}
          ResourceRecords:
            - theworld.org.
          TTL: "60"
          Type: CNAME
  Media:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: Media
      HostedZoneId: !Ref HostedZone
      RecordSets:
        - Name: !Sub media.${Domain}
          Type: A
          AliasTarget:
            DNSName: d2xoxjnw2cr97i.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
        - Name: !Sub media.${Domain}
          Type: AAAA
          AliasTarget:
            DNSName: d2xoxjnw2cr97i.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID

  GlobalPost:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: GlobalPost
      HostedZoneId: !Ref HostedZone
      RecordSets:
        - Name: !Sub gpinvestigations.${Domain}
          ResourceRecords:
            -  52.0.16.118
          TTL: "60"
          Type: A

  WebProd:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: Production web
      HostedZoneId: !Ref HostedZone
      RecordSets:
        # pri.org
        - Name: !Ref Domain
          Type: A
          AliasTarget:
            DNSName: d1dvqc7hwl2ebv.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
        - Name: !Ref Domain
          Type: AAAA
          AliasTarget:
            DNSName: d1dvqc7hwl2ebv.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID

        # cdn.pri.org
        - Name: !Sub cdn.${Domain}
          Type: A
          AliasTarget:
            DNSName: d2xoxjnw2cr97i.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
        - Name: !Sub cdn.${Domain}
          Type: AAAA
          AliasTarget:
            DNSName: d2xoxjnw2cr97i.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID

        # cdn2.pri.org
        - Name: !Sub cdn2.${Domain}
          Type: A
          AliasTarget:
            DNSName: d1z2cenxmmqwzp.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
        - Name: !Sub cdn2.${Domain}
          Type: AAAA
          AliasTarget:
            DNSName: d1z2cenxmmqwzp.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID

        # interactive.pri.org
        - Name: !Sub interactive.${Domain}
          Type: A
          AliasTarget:
            DNSName: d1z2cenxmmqwzp.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
        - Name: !Sub interactive.${Domain}
          Type: AAAA
          AliasTarget:
            DNSName: d1z2cenxmmqwzp.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID

        # www.pri.org
        - Name: !Sub www.${Domain}
          Type: A
          AliasTarget:
            DNSName: d1dvqc7hwl2ebv.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
        - Name: !Sub www.${Domain}
          Type: AAAA
          AliasTarget:
            DNSName: d1dvqc7hwl2ebv.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
  WebStag:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: Staging web
      HostedZoneId: !Ref HostedZone
      RecordSets:

        # beta.pri.org
        - Name: !Sub beta.${Domain}
          Type: A
          AliasTarget:
            DNSName: d1dvqc7hwl2ebv.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
        - Name: !Sub beta.${Domain}
          Type: AAAA
          AliasTarget:
            DNSName: d1dvqc7hwl2ebv.cloudfront.net.
