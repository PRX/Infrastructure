        # interactive-dev.pri.org
        - Name: !Sub interactive-dev.${Domain}
          Type: A
          AliasTarget:
            DNSName: dzaz8bp6ddbuu.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID
        - Name: !Sub interactive-dev.${Domain}
          Type: AAAA
          AliasTarget:
            DNSName: dzaz8bp6ddbuu.cloudfront.net.
            HostedZoneId: Z2FDTNDATAQYW2 # Global CloudFront hosted zone ID

  Feeds:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: RSS feeds
      HostedZoneId: !Ref HostedZone
      RecordSets:
        # feeds.pri.org
        - Name: !Sub feeds.${Domain}
          ResourceRecords:
            - 19zzie2.feedproxy.ghs.google.com.
          TTL: "60"
          Type: CNAME

# Service-specific
  GoogleWorkspace:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: Google Workspace
      HostedZoneId: !Ref HostedZone
      RecordSets:
        # DKIM
        # This is the public key matching a private key that Google Workspace
        # uses to sign emails it send on our behalf
        # https://admin.google.com/ac/apps/gmail/authenticateemail
        - Name: !Sub google._domainkey.${Domain}
          ResourceRecords:
            - '"v=DKIM1; k=rsa; p=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQCyC5Xk8gDn40SqLDUJxITYqKQFKF2yCZ0tbGaAhn2s8SPJ+OwD6AaMmgZH3bl0mFnnIa7tfQBbrwKo1UI8ARBZRwCV4Ob6I1tn9r9raI/MxjzxFBeGzGh+EErs5wSWpLBL7Tkzs+s3QYtW6/DHIgu7TJzgL6csJiwpNtIx5ussEQIDAQAB"'
          TTL: "300"
          Type: TXT
  AwsAcmPri:
